
services:
  # ─────────────────────────────────────────
  # PostgreSQL Database (Local)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-network

  # ─────────────────────────────────────────
  # pgAdmin 4 (PostgreSQL Web UI)
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-web
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: 'False'
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: 10
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - microservices-network

  # ─────────────────────────────────────────
  # Redis (BullMQ backend for scheduler)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-network

  # ─────────────────────────────────────────
  # Message Broker
  # ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - '5672:5672'    # AMQP protocol
      - '15672:15672'  # Management UI → http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-network

  # ─────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    restart: unless-stopped
    env_file: .env
    ports:
      - '${GATEWAY_PORT}:${GATEWAY_PORT}'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      DATABASE_URL: ${GATEWAY_DATABASE_URL}
      PORT: ${GATEWAY_PORT}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVICE_NAME: gateway
    networks:
      - microservices-network

  # ─────────────────────────────────────────
  # Identity Service
  # ─────────────────────────────────────────
  identity:
    build:
      context: ./identity
      dockerfile: Dockerfile
    container_name: identity-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '${IDENTITY_PORT}:${IDENTITY_PORT}'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      DATABASE_URL: ${IDENTITY_DATABASE_URL}
      PORT: ${IDENTITY_PORT}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVICE_NAME: identity
    networks:
      - microservices-network

  # ─────────────────────────────────────────
  # WhatsApp Microservice
  # ─────────────────────────────────────────
  whatsapp:
    build:
      context: ./whatsapp
      dockerfile: Dockerfile
    container_name: whatsapp-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '${WHATSAPP_PORT}:${WHATSAPP_PORT}'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      DATABASE_URL: ${WHATSAPP_DATABASE_URL}
      PORT: ${WHATSAPP_PORT}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVICE_NAME: whatsapp
    networks:
      - microservices-network

  # ─────────────────────────────────────────
  # Slack Microservice
  # ─────────────────────────────────────────
  slack:
    build:
      context: ./slack
      dockerfile: Dockerfile
    container_name: slack-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '${SLACK_PORT}:${SLACK_PORT}'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      DATABASE_URL: ${SLACK_DATABASE_URL}
      PORT: ${SLACK_PORT}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVICE_NAME: slack
    networks:
      - microservices-network

  # ─────────────────────────────────────────
  # Notion Microservice
  # ─────────────────────────────────────────
  notion:
    build:
      context: ./notion
      dockerfile: Dockerfile
    container_name: notion-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '${NOTION_PORT}:${NOTION_PORT}'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      DATABASE_URL: ${NOTION_DATABASE_URL}
      PORT: ${NOTION_PORT}
      NOTION_INTEGRATION_TOKEN: ${NOTION_INTEGRATION_TOKEN}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVICE_NAME: notion
    networks:
      - microservices-network

  # ─────────────────────────────────────────
  # Instagram Microservice
  # ─────────────────────────────────────────
  instagram:
    build:
      context: ./instagram
      dockerfile: Dockerfile
    container_name: instagram-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '${INSTAGRAM_PORT}:${INSTAGRAM_PORT}'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      DATABASE_URL: ${INSTAGRAM_DATABASE_URL}
      PORT: ${INSTAGRAM_PORT}
      INSTAGRAM_ACCESS_TOKEN: ${INSTAGRAM_ACCESS_TOKEN}
      INSTAGRAM_PAGE_ID: ${INSTAGRAM_PAGE_ID}
      INSTAGRAM_WEBHOOK_VERIFY_TOKEN: ${INSTAGRAM_WEBHOOK_VERIFY_TOKEN}
      INSTAGRAM_API_VERSION: ${INSTAGRAM_API_VERSION}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVICE_NAME: instagram
    networks:
      - microservices-network

  # ─────────────────────────────────────────
  # TikTok Microservice
  # ─────────────────────────────────────────
  tiktok:
    build:
      context: ./tiktok
      dockerfile: Dockerfile
    container_name: tiktok-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '${TIKTOK_PORT}:${TIKTOK_PORT}'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      DATABASE_URL: ${TIKTOK_DATABASE_URL}
      PORT: ${TIKTOK_PORT}
      TIKTOK_APP_ID: ${TIKTOK_APP_ID}
      TIKTOK_APP_SECRET: ${TIKTOK_APP_SECRET}
      TIKTOK_ACCESS_TOKEN: ${TIKTOK_ACCESS_TOKEN}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVICE_NAME: tiktok
    networks:
      - microservices-network

  # ─────────────────────────────────────────
  # Facebook Microservice
  # ─────────────────────────────────────────
  facebook:
    build:
      context: ./facebook
      dockerfile: Dockerfile
    container_name: facebook-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '${FACEBOOK_PORT}:${FACEBOOK_PORT}'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      DATABASE_URL: ${FACEBOOK_DATABASE_URL}
      PORT: ${FACEBOOK_PORT}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${FACEBOOK_PAGE_ACCESS_TOKEN}
      FACEBOOK_PAGE_ID: ${FACEBOOK_PAGE_ID}
      FACEBOOK_WEBHOOK_VERIFY_TOKEN: ${FACEBOOK_WEBHOOK_VERIFY_TOKEN}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVICE_NAME: facebook
      FACEBOOK_API_VERSION: ${FACEBOOK_API_VERSION}
    networks:
      - microservices-network

  # ─────────────────────────────────────────
  # Scraping Microservice
  # ─────────────────────────────────────────
  # ─────────────────────────────────────────
  # Browserless Chrome (for Puppeteer)
  # ─────────────────────────────────────────
  browserless:
    image: browserless/chrome:latest
    container_name: browserless-chrome
    restart: unless-stopped
    ports:
      - '3222:3222'
    environment:
      PORT: 3222
      TIMEOUT: 30000
      CONNECTION_TIMEOUT: 30000
    networks:
      - microservices-network

  scraping:
     build:
       context: ./scrapping
       dockerfile: Dockerfile
     container_name: scraping-service
     restart: unless-stopped
     env_file: .env
     ports:
       - '${SCRAPING_PORT:-3008}:3008'
     depends_on:
       postgres:
         condition: service_healthy
       rabbitmq:
         condition: service_healthy
       browserless:
         condition: service_started
     environment:
       RABBITMQ_URL: ${RABBITMQ_URL}
       RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-channels}
       RABBITMQ_QUEUE_SCRAPING: scraping.task
       RABBITMQ_QUEUE_NOTIFICATIONS: whatsapp_direct_messages
       GATEWAY_URL: ${GATEWAY_URL:-http://gateway:3000}
       GATEWAY_WEBHOOK_TOKEN: ${GATEWAY_WEBHOOK_TOKEN}
       # Browserless Chrome connection
       BROWSERLESS_WS_ENDPOINT: ws://browserless:3222
       PUPPETEER_TIMEOUT: ${PUPPETEER_TIMEOUT:-30000}
       PUPPETEER_MAX_POOL_SIZE: ${PUPPETEER_MAX_POOL_SIZE:-5}
       PUPPETEER_HEADLESS: 'true'
       RATE_LIMIT_DAILY: ${RATE_LIMIT_DAILY:-10}
       RATE_LIMIT_WINDOW_HOURS: ${RATE_LIMIT_WINDOW_HOURS:-24}
       LOG_LEVEL: info
       NODE_ENV: production
       POSTGRES_HOST: ${POSTGRES_HOST}
       POSTGRES_PORT: ${POSTGRES_PORT}
       POSTGRES_USER: ${POSTGRES_USER}
       POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
       SCRAPING_DATABASE_URL: ${SCRAPING_DATABASE_URL}
       SERVICE_NAME: scraping
     networks:
       - microservices-network

  # ─────────────────────────────────────────
  # Mailpit — local SMTP capture for dev (web UI :8025, SMTP :1025)
  # Activate with `docker-compose --profile dev up`
  # ─────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    profiles: [dev]
    networks:
      - microservices-network

  # ─────────────────────────────────────────
  # Email Microservice (Resend / SMTP via adapter)
  # ─────────────────────────────────────────
  email:
    build:
      context: ./email
      dockerfile: Dockerfile
    container_name: email-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '${EMAIL_PORT:-3007}:3007'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-channels}
      DATABASE_URL: ${EMAIL_DATABASE_URL}
      EMAIL_DATABASE_URL: ${EMAIL_DATABASE_URL}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-mailpit}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-1025}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER}
      EMAIL_SMTP_PASS: ${EMAIL_SMTP_PASS}
      EMAIL_SMTP_SECURE: ${EMAIL_SMTP_SECURE:-false}
      PORT: ${EMAIL_PORT:-3007}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVICE_NAME: email
    networks:
      - microservices-network

  # ─────────────────────────────────────────
  # Scheduler Microservice (BullMQ + Redis)
  # ─────────────────────────────────────────
  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    container_name: scheduler-service
    restart: unless-stopped
    env_file: .env
    ports:
      - '${SCHEDULER_PORT:-3009}:3009'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-channels}
      DATABASE_URL: ${SCHEDULER_DATABASE_URL}
      SCHEDULER_DATABASE_URL: ${SCHEDULER_DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      PORT: ${SCHEDULER_PORT:-3009}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVICE_NAME: scheduler
    networks:
      - microservices-network

volumes:
  postgres_data:
  pgadmin_data:
  rabbitmq_data:
  redis_data:

networks:
  microservices-network:
    name: microservices-network
